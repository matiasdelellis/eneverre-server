openapi: 3.0.3

info:
  title: Eneverre NVR API
  version: 1.0.0
  description: |
    API for camera management, streaming and playback.

    Typical flow:
    1. GET /api/cameras
    2. Pick a camera (playback=true if you want recordings)
    3. GET /api/camera/{id}/recordings/list
    4. GET /api/camera/{id}/recordings/get

servers:
  - url: http://localhost:8080

# Most endpoints accept either HTTP Basic or a Bearer access token.
security:
  - basicAuth: []
  - bearerAuth: []

paths:
  /api/health:
    get:
      summary: Health check
      security: []
      responses:
        '200':
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: eneverre-api

  /api/status:
    get:
      summary: Operational status (admin)
      description: >-
        Admin-only operational snapshot: per-camera connectivity, recording and
        privacy state, aggregate counts, and — when recording is enabled — the
        recording volume's disk headroom. Requires an admin token (403 for a
        non-admin).
      responses:
        '200':
          description: Status snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                    example: eneverre-api
                  version:
                    type: string
                  uptime_seconds:
                    type: integer
                    format: int64
                  recording_enabled:
                    type: boolean
                  cameras:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        name: { type: string }
                        connected: { type: boolean }
                        recording: { type: boolean }
                        mse_active: { type: boolean }
                        privacy: { type: boolean }
                  totals:
                    type: object
                    properties:
                      cameras: { type: integer }
                      connected: { type: integer }
                      recording: { type: integer }
                      privacy: { type: integer }
                  storage:
                    type: object
                    description: >-
                      Present only when recording is enabled and the volume can
                      be queried. min_free_bytes / low_space / low_space_since
                      are populated by the engine's low-disk watcher
                      ([media] min_free_bytes, default 1 GiB; 0 disables); see
                      doc/MEDIA.md → Low-disk safety.
                    properties:
                      record_dir: { type: string }
                      total_bytes: { type: integer, format: int64 }
                      free_bytes: { type: integer, format: int64 }
                      used_bytes: { type: integer, format: int64 }
                      min_free_bytes: { type: integer, format: int64 }
                      low_space: { type: boolean }
                      low_space_since: { type: string, format: date-time }
        '401':
          description: Missing or invalid token
        '403':
          description: Admin required

  /api/metrics:
    get:
      summary: Prometheus metrics
      description: >-
        Prometheus text-format metrics. Open to a scraper on loopback without
        auth; any other client must authenticate. Enabled by default; when
        `[server] metrics = false` the endpoint is not mounted and returns 404.
        Camera metrics are aggregate counts with no per-camera id label. See
        doc/MEDIA.md#metrics.
      responses:
        '200':
          description: Metrics in Prometheus text exposition format.
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Missing or invalid token (from a non-loopback client).
        '404':
          description: Metrics disabled ([server] metrics = false).

  /api/metrics/json:
    get:
      summary: Metrics (JSON)
      description: >-
        The same metrics as /api/metrics rendered as JSON. Same auth model
        (loopback bypass, else authenticated) and same 404 when disabled.
      responses:
        '200':
          description: Metrics as a JSON object.
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Missing or invalid token (from a non-loopback client).
        '404':
          description: Metrics disabled ([server] metrics = false).

  /api/auth/login:
    post:
      summary: Login (username/password)
      description: >-
        Returns a short-lived access token plus a long-lived refresh token
        (both on the same session). `device_name` is optional and labels the
        session in GET /api/users/me/sessions.


        The JSON body is capped at 1 MiB (bodies over the limit are rejected
        with 422). `password` is capped at 1024 bytes — a longer value is
        rejected with 422 rather than fed to PBKDF2, so a giant password
        cannot be used as a CPU-exhaustion vector on this unauthenticated path.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
                  maxLength: 1024
                device_name:
                  type: string
      responses:
        '200':
          description: Session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  expires_at:
                    type: integer
                    format: int64
                    description: Unix seconds (access-token expiry)
                  refresh_token:
                    type: string
                  refresh_expires_at:
                    type: integer
                    format: int64
                  username:
                    type: string
                  first_name:
                    type: string
                    nullable: true
                  last_name:
                    type: string
                    nullable: true
                  role:
                    type: string
                  is_admin:
                    type: boolean
                  must_change_password:
                    type: boolean
                    description: >-
                      When true the client must send the user through the
                      change-password flow (PUT /api/users/me/password) before
                      using the app. Set for the seeded initial admin and for
                      any account an admin flagged; cleared by a successful
                      self password change.
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '422':
          description: Malformed body, body over 1 MiB, or password over 1024 bytes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '429':
          description: >-
            Too many failed login attempts from this IP or for this username
            (in-memory throttle; only failures count and a success clears the
            username's counter). Carries a Retry-After header in seconds. The
            same throttle guards failed HTTP Basic attempts on every
            authenticated endpoint.
          headers:
            Retry-After:
              schema:
                type: integer
              description: Seconds until the failure window expires.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'

  /api/auth/refresh:
    post:
      summary: Renew the session with the refresh token
      description: >-
        Rotates both secrets in place on the same row and slides both expiries
        forward. Device (TV) sessions have no refresh token and cannot use this
        endpoint.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Session renewed
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  expires_at:
                    type: integer
                    format: int64
                  refresh_token:
                    type: string
                  refresh_expires_at:
                    type: integer
                    format: int64
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'

  /api/auth/logout:
    post:
      summary: Log out the current session
      description: Revokes the presented Bearer token.
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/cameras:
    get:
      summary: List cameras
      responses:
        '200':
          description: List of cameras
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Camera'
    post:
      summary: Create a camera (admin)
      description: >-
        Adds a camera. Cameras live in the database (the `cameras.d/*.ini` files
        are only a first-run seed), so a create takes effect immediately — the
        media engine brings the new camera online without a restart. Requires an
        admin token (403 for a non-admin).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CameraSpec'
      responses:
        '201':
          description: The created camera, in the same public shape as GET /api/cameras.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Camera'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: A camera with that id already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '422':
          description: Validation failure (bad id, missing source, invalid transport).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'

  /api/cameras/probe:
    post:
      summary: Probe an RTSP source (admin)
      description: >-
        Tests an RTSP source URL for the "test connection" step of the add/edit
        wizard, without creating anything. Always answers 200: on success the
        detected codecs and dimensions, otherwise `{ok:false, error}` so the UI
        can show the reason inline. Requires an admin token (403 for a
        non-admin).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source]
              properties:
                source:
                  type: string
                  description: The camera's RTSP URL to probe.
                transport:
                  type: string
                  enum: [auto, tcp, udp]
                  default: auto
      responses:
        '200':
          description: Probe result (success or failure — both are 200).
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  codecs:
                    type: array
                    items:
                      type: string
                    description: Detected stream codecs (present when ok is true).
                  width:
                    type: integer
                  height:
                    type: integer
                  error:
                    type: string
                    description: Failure reason (present when ok is false).
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/cameras/probe-thingino:
    post:
      summary: Test a Thingino camera's URL + API key (admin)
      description: >-
        Tests a Thingino URL + API key for the wizard's Thingino step, without
        creating anything. Always answers 200: `{ok:false, error}` when the
        camera is unreachable or rejects the API key, otherwise `{ok:true,
        ptz}`. When the camera also reports a working motor, the PTZ
        calibration comes along too: `pan_steps`/`tilt_steps` read straight off
        the firmware, `pan_degrees` fixed at 360 (every Thingino gimbal rotates
        continuously) with `tilt_degrees` derived from pan's steps-per-degree
        ratio (the firmware has no tilt-range query), the firmware's own
        configured position as `home_x`/`home_y`, and `privacy_x`/`privacy_y`
        leveled to the same pan with tilt at 0°. Requires an admin token (403
        for a non-admin).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [thingino_url, thingino_api_key]
              properties:
                thingino_url:
                  type: string
                  description: The camera's Thingino firmware base URL.
                thingino_api_key:
                  type: string
                  description: The camera's Thingino API key.
      responses:
        '200':
          description: Test result (success or failure — both are 200).
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  ptz:
                    type: boolean
                    description: Whether the camera reported a working motor.
                  pan_steps:
                    type: integer
                  pan_degrees:
                    type: integer
                  tilt_steps:
                    type: integer
                  tilt_degrees:
                    type: integer
                  home_x:
                    type: number
                  home_y:
                    type: number
                  privacy_x:
                    type: number
                  privacy_y:
                    type: number
                  error:
                    type: string
                    description: Failure reason (present when ok is false).
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/camera/{camera_id}:
    put:
      summary: Update a camera (admin)
      description: >-
        Replaces the stored config of an existing camera. The id is fixed by the
        URL and cannot be changed (it is the recording path); any `id` in the
        body is ignored. The media engine is reconfigured live (old pipeline torn
        down, new one started) so source/transport/sink changes apply without a
        restart. Requires an admin token (403 for a non-admin).
      parameters:
        - $ref: '#/components/parameters/camera_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CameraSpec'
      responses:
        '200':
          description: The updated camera, in the same public shape as GET /api/cameras.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Camera'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validation failure (missing source, invalid transport).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
    delete:
      summary: Delete a camera (admin)
      description: >-
        Removes a camera: the DB row is deleted and the camera is detached from
        the media engine and the in-memory set. Recorded segments already on disk
        are left for retention to prune. Requires an admin token (403 for a
        non-admin).
      parameters:
        - $ref: '#/components/parameters/camera_id'
      responses:
        '200':
          description: Camera deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/camera/{camera_id}/config:
    get:
      summary: Full stored camera config (admin)
      description: >-
        Returns the complete stored config of one camera, **including** the
        source / backchannel / thingino credentials, so the edit form can prefill
        them. This is intentionally separate from GET /api/cameras, whose public
        model strips those secret fields and must never leak them; here the caller
        is an authenticated admin editing a camera they configured. Requires an
        admin token (403 for a non-admin).
      parameters:
        - $ref: '#/components/parameters/camera_id'
      responses:
        '200':
          description: The camera's stored config, credentials included.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CameraSpec'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/camera/{camera_id}/ptz/move:
    post:
      summary: Move camera (PTZ)
      description: >-
        Issues a relative PTZ move given **pan/tilt in degrees** — the server
        converts to firmware steps using the camera's calibration and clamps
        to the full mechanical range so a runaway request can't command an
        unbounded rotation.
      parameters:
        - $ref: '#/components/parameters/camera_id'
        - name: pan
          in: query
          description: >-
            Pan delta in degrees (positive = right, negative = left).
            Converted to firmware steps and clamped to ±pan_range/2 by the
            server.
          schema:
            type: number
          example: 10
        - name: tilt
          in: query
          description: >-
            Tilt delta in degrees (positive = down, negative = up).
            Converted to firmware steps and clamped to ±tilt_range/2 by the
            server.
          schema:
            type: number
          example: -5
      responses:
        '200':
          description: >-
            The camera's new position in degrees, same shape as
            `GET .../ptz/position`. `pan`/`tilt` are omitted (empty object)
            on the rare case the firmware didn't echo a position for this
            move — the move itself still succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  pan:
                    type: number
                    description: New pan in degrees
                    example: 12.3
                  tilt:
                    type: number
                    description: New tilt in degrees
                    example: -4.5
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'

  /api/camera/{camera_id}/ptz/position:
    get:
      summary: Get the current PTZ position
      description: >-
        Returns the camera's last known motor position in degrees as
        `{"pan": …, "tilt": …}`. The position is cached from the last
        successful PTZ move (and primed at startup) and converted to degrees
        using the camera's calibration. Returns 503 when the cache is cold
        (no move recorded and the startup probe did not reach the camera) so
        the caller can distinguish "no data" from a permanent failure.
      parameters:
        - $ref: '#/components/parameters/camera_id'
      responses:
        '200':
          description: Current position in degrees
          content:
            application/json:
              schema:
                type: object
                required: [pan, tilt]
                properties:
                  pan:
                    type: number
                    description: Current pan in degrees
                    example: 12.3
                  tilt:
                    type: number
                    description: Current tilt in degrees
                    example: -4.5
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'
        '503':
          description: PTZ position is unknown — the camera has not been moved and the startup probe did not reach it
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'

  /api/camera/{camera_id}/ptz/home:
    post:
      summary: Move the camera to its home position (configured home_x/home_y)
      parameters:
        - $ref: '#/components/parameters/camera_id'
      responses:
        '200':
          description: >-
            The camera's new position in degrees, same shape as
            `POST .../ptz/move`.
          content:
            application/json:
              schema:
                type: object
                properties:
                  pan:
                    type: number
                    description: New pan in degrees
                    example: 12.3
                  tilt:
                    type: number
                    description: New tilt in degrees
                    example: -4.5
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'

  /api/camera/{camera_id}/ptz/recalibrate:
    post:
      summary: Recalibrate the PTZ motor
      description: >-
        Runs the motor recalibration routine and reports the position the
        gimbal settles at afterward (generally its home position), same
        shape as `POST .../ptz/move`. `pan`/`tilt` are omitted (empty
        object) on the rare case the position couldn't be read back —
        the recalibration itself still succeeded.
      parameters:
        - $ref: '#/components/parameters/camera_id'
      responses:
        '200':
          description: The camera's settled position in degrees.
          content:
            application/json:
              schema:
                type: object
                properties:
                  pan:
                    type: number
                    description: New pan in degrees
                    example: 12.3
                  tilt:
                    type: number
                    description: New tilt in degrees
                    example: -4.5
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'

  /api/camera/{camera_id}/privacy:
    post:
      summary: Enable/disable privacy mode
      description: >-
        Enables or disables privacy for the camera. Privacy stops recording and
        transmission (live MSE + RTSP relay) for any camera by pausing the media
        engine's pipeline for it — while enabled the camera's `live_mse`/`rtsp`
        URLs are withheld from `/api/cameras`. On thingino cameras it
        additionally drives the firmware lens blackout (prudynt): when enabling,
        if a privacy position is configured (privacy_x/privacy_y >= 0) the PTZ is
        first moved there; when disabling it returns to home_x/home_y. Available
        for every camera whose `capabilities.privacy` is true (INI `privacy` key,
        default true); cameras with `privacy = false` are always-on and return
        404 here.
      parameters:
        - $ref: '#/components/parameters/camera_id'
        - name: enable
          in: query
          required: true
          schema:
            type: boolean
      responses:
        '200':
          description: >-
            On thingino cameras, the raw response from the camera firmware.
            On other cameras, `{"privacy": <bool>}`.
          content:
            application/json:
              schema:
                type: object
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Missing or invalid 'enable' query param
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '502':
          $ref: '#/components/responses/BadGateway'

  /api/camera/{camera_id}/thumbnail:
    get:
      summary: JPEG snapshot of the camera
      description: >-
        Returns a still image for the camera. For Thingino cameras it proxies the
        firmware snapshot (needs both `thingino_url` and `thingino_api_key`
        configured); for any other camera it proxies the configured
        `snapshot_url` (the camera's own JPEG endpoint). 404 when the camera has
        neither configured.
      parameters:
        - $ref: '#/components/parameters/camera_id'
      responses:
        '200':
          description: JPEG image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'

  /api/camera/{camera_id}/talk:
    get:
      summary: Push-to-talk WebSocket (two-way audio)
      description: >
        Upgrades to a WebSocket that relays client microphone audio to the
        camera's ONVIF Profile T backchannel. Enabled only for cameras whose INI
        defines a `backchannel` URL (`capabilities.talk = true`); at most one
        session per camera. Because a browser cannot set an `Authorization`
        header on a WebSocket upgrade, the access token is carried in the
        `Sec-WebSocket-Protocol` header — the client offers `["eneverre-talk",
        <token>]` and the server echoes only `eneverre-talk` — which keeps the
        token out of the URL and access logs; a `?token=` query param and a
        Bearer header are accepted as fallbacks. Auth is validated before the
        upgrade. After the upgrade the client sends a JSON handshake
        `{"sampleRate": N}` then binary mono S16LE PCM frames (resampled to 8 kHz
        and encoded G.711). Adding `"codec": "aac"` to the handshake instead
        streams raw AAC-LC access units that the server forwards untranscoded to
        the camera's AAC (`MPEG4-GENERIC`) backchannel, when the camera exposes
        one. Once the camera backchannel is live the server sends one text
        `{"status":"ready"}`, then the socket is receive-only apart from keepalive
        pings (25s; the session is dropped if no pong or audio arrives within 60s).
      parameters:
        - $ref: '#/components/parameters/camera_id'
        - name: token
          in: query
          required: false
          description: Access token (alternative to the Authorization header).
          schema:
            type: string
      responses:
        '101':
          description: Switching Protocols — WebSocket established
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Two-way audio not available for this camera
        '409':
          description: An active talk session already exists for this camera

  /api/recordings/paths:
    get:
      summary: Camera ids that have recordings (embedded engine)
      description: |
        Embedded media engine only (404 otherwise). Returns the camera ids that
        have at least one recorded segment in the index — useful for a client
        that only browses recordings. Equivalent to the NVR standalone's
        /api/paths.
      responses:
        '200':
          description: Recorded paths (camera ids), sorted
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
              examples:
                example:
                  value: ["calle", "frente", "galeria", "interior", "jardin"]
        '404':
          $ref: '#/components/responses/NotFound'

  /api/camera/{camera_id}/recordings/list:
    get:
      summary: List recordings
      parameters:
        - $ref: '#/components/parameters/camera_id'
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date-time
          example: "2026-05-04T10:00:00Z"
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date-time
          example: "2026-05-04T11:00:00Z"
      responses:
        '200':
          description: Recording segments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Recording'
              examples:
                example:
                  value:
                    - start: "2026-05-04T10:00:00Z"
                      duration: 60

        '400':
          $ref: '#/components/responses/BadRequest'

        '404':
          $ref: '#/components/responses/NotFound'

        '422':
          description: start and end are required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'

  /api/camera/{camera_id}/recordings/get:
    get:
      summary: Download recorded video clip
      description: |
        Returns a single continuous fragmented-MP4 clip covering
        [start, start+duration], stitching consecutive segments gaplessly.

        **Embedded engine (gap fill):** coverage gaps within the window are
        filled with a black "NO RECORDING" frame occupying the real gap time,
        so the clip is never silently trimmed and spans the full requested
        window. To make the spliced black frame decode alongside the recording
        (different SPS), the clip is emitted as **avc3** (H264 parameter sets
        carried in-band). Players must support avc3 — mainstream players
        (VLC, browsers, QuickTime, ffmpeg-based) do. Pass `fill_gaps=false` to
        get the legacy gapless behavior (avc1, truncated at the first gap).
      parameters:
        - $ref: '#/components/parameters/camera_id'
        - name: start
          in: query
          required: true
          description: Clip start (RFC3339, UTC).
          schema:
            type: string
            format: date-time
        - name: duration
          in: query
          required: true
          description: Clip length in seconds.
          schema:
            type: number
        - name: fill_gaps
          in: query
          required: false
          description: >
            Embedded engine only. Default true (fill gaps with black + emit
            avc3). Set to `false` for legacy gapless output (truncates at the
            first gap, avc1).
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: >
            fragmented-MP4 clip (video/mp4). H264 (avc3 when gaps were filled) +
            AAC/G711 audio when present. On a miss, 404 with an
            `X-Next-Available` header pointing at the next recorded start.
          content:
            video/mp4:
              schema:
                type: string
                format: binary

        '400':
          $ref: '#/components/responses/BadRequest'

        '404':
          $ref: '#/components/responses/NotFound'

        '422':
          description: start and duration are required, or duration exceeds the export limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'

  /api/camera/{camera_id}/recordings/timeline:
    get:
      summary: Recorded extent (embedded engine)
      description: |
        Embedded media engine only (404 otherwise). Returns the recorded extent
        for a camera: first start, last end, and segment count. start/end are
        null when there are no recordings.
      parameters:
        - $ref: '#/components/parameters/camera_id'
      responses:
        '200':
          description: Recorded extent
          content:
            application/json:
              schema:
                type: object
                properties:
                  start:
                    type: string
                    nullable: true
                    format: date-time
                  end:
                    type: string
                    nullable: true
                    format: date-time
                  count:
                    type: integer
              examples:
                example:
                  value:
                    start: "2026-05-04T10:00:00Z"
                    end: "2026-05-04T13:20:00Z"
                    count: 1180
        '404':
          $ref: '#/components/responses/NotFound'

  /api/camera/{camera_id}/recordings/gaps:
    get:
      summary: Recording coverage gaps (embedded engine)
      description: |
        Embedded media engine only (404 otherwise). Returns interruptions longer
        than 1s between consecutive segments, optionally bounded by start/end.
      parameters:
        - $ref: '#/components/parameters/camera_id'
        - name: start
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Coverage gaps
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    start:
                      type: string
                      format: date-time
                    end:
                      type: string
                      format: date-time
                    duration:
                      type: number
              examples:
                example:
                  value:
                    - start: "2026-05-04T10:30:00Z"
                      end: "2026-05-04T10:30:12Z"
                      duration: 12
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/camera/{camera_id}/recordings/hls/playlist.m3u8:
    get:
      summary: HLS VOD playlist (embedded engine)
      description: |
        Embedded media engine only. An HLS VOD (CMAF) playlist for
        [start, end], for scrubbable timeline playback via hls.js. Gaps are
        collapsed into a continuous timeline; `EXT-X-PROGRAM-DATE-TIME` per
        segment gives wall-clock. The playlist's init/segment URIs are relative
        and resolve under this same `/recordings/hls/` prefix; every request
        needs the Bearer token (use hls.js `xhrSetup`).
      parameters:
        - $ref: '#/components/parameters/camera_id'
        - name: start
          in: query
          required: true
          schema: { type: string, format: date-time }
        - name: end
          in: query
          required: true
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: HLS VOD playlist
          content:
            application/vnd.apple.mpegurl:
              schema: { type: string }
        '404':
          $ref: '#/components/responses/NotFound'

  /api/camera/{camera_id}/recordings/hls/init.mp4:
    get:
      summary: HLS VOD CMAF init segment (embedded engine)
      description: Referenced by the playlist (`EXT-X-MAP`). Embedded engine only.
      parameters:
        - $ref: '#/components/parameters/camera_id'
      responses:
        '200':
          description: CMAF init
          content:
            video/mp4:
              schema: { type: string, format: binary }
        '404':
          $ref: '#/components/responses/NotFound'

  /api/camera/{camera_id}/recordings/hls/segment.m4s:
    get:
      summary: HLS VOD CMAF media segment (embedded engine)
      description: Referenced by the playlist. Embedded engine only.
      parameters:
        - $ref: '#/components/parameters/camera_id'
      responses:
        '200':
          description: CMAF media segment
          content:
            video/iso.segment:
              schema: { type: string, format: binary }
        '404':
          $ref: '#/components/responses/NotFound'

  /api/camera/{camera_id}/live/info:
    get:
      summary: Live stream availability (embedded engine)
      description: |
        Only served when the embedded media engine ([media]) is active; returns
        404 otherwise. Reports whether a live MSE source is available for the
        camera and the codec string the browser needs to build a MediaSource.
      parameters:
        - $ref: '#/components/parameters/camera_id'
      responses:
        '200':
          description: Availability
          content:
            application/json:
              schema:
                type: object
                properties:
                  available:
                    type: boolean
                  mime:
                    type: string
              examples:
                example:
                  value:
                    available: true
                    mime: 'video/mp4; codecs="avc1.42c00c"'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/camera/{camera_id}/live/stream:
    get:
      summary: Live video stream (embedded engine, MSE fMP4)
      description: |
        Only served when the embedded media engine ([media]) is active; returns
        404 otherwise. Streams the camera's live fragmented-MP4 (init + parts)
        as chunked HTTP, to be fed into a browser MediaSource SourceBuffer.
      parameters:
        - $ref: '#/components/parameters/camera_id'
      responses:
        '200':
          description: Chunked fMP4 stream
          content:
            video/mp4:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          description: No live source

  /api/camera/{camera_id}/events/{event_id}:
    delete:
      summary: Delete an event
      parameters:
        - $ref: '#/components/parameters/camera_id'
        - name: event_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Event deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/camera/{camera_id}/events:
    get:
      summary: List motion events
      description: |
        Returns the motion (or other) events recorded for a camera, filtered by
        a unix-or-RFC3339 timestamp range. Supports pagination with `limit` and
        `offset`. Used by the UI timeline to draw the red (Major1) markers over
        the recordings.
      parameters:
        - $ref: '#/components/parameters/camera_id'
        - name: since
          in: query
          schema:
            type: string
          description: Start timestamp (unix seconds or RFC3339). Optional.
        - name: until
          in: query
          schema:
            type: string
          description: End timestamp (unix seconds or RFC3339). Optional.
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Event list + total
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/Event'
                  total:
                    type: integer
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      summary: Event webhook (motion/IO/etc.)
      description: |
        Endpoint cameras (or external integrations) use to record a motion,
        privacy, I/O, etc. event. Requires `[events] webhook_secret`, sent in
        the `X-Webhook-Secret` header or as `?token=...` (query). Accepts any
        body; if it cannot be parsed as valid JSON, the event is stored with the
        raw body in `source` and type `motion`.
      parameters:
        - $ref: '#/components/parameters/camera_id'
        - name: token
          in: query
          schema:
            type: string
          description: Alternative to the X-Webhook-Secret header
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                timestamp:
                  oneOf:
                    - type: integer
                      description: Unix seconds
                    - type: string
                      format: date-time
                event:
                  type: string
                duration_seconds:
                  type: integer
                  minimum: 0
      responses:
        '201':
          description: Event recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          description: webhook_secret not configured on the server

  # --- device-login flow (TV / headless clients) --------------------------
  /api/auth/device:
    get:
      summary: Start pairing a device
      description: >-
        The device requests a device_code / user_code pair. The user approves
        the user_code from an authenticated session (POST
        /api/auth/device/verify) while the device polls with the device_code.
      security: []
      parameters:
        - name: device_name
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Codes issued (expire in 5 minutes)
          content:
            application/json:
              schema:
                type: object
                properties:
                  device_code:
                    type: string
                  user_code:
                    type: string
                  expires_in:
                    type: integer
                    example: 300
                  device_name:
                    type: string
                    nullable: true

  /api/auth/device/{device_code}:
    get:
      summary: Poll the device status
      security: []
      parameters:
        - name: device_code
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current status (pending / approved / expired)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [pending, approved, expired]
                  token:
                    type: string
                    description: Only present when status = approved
                  expires_at:
                    type: integer
                    format: int64
                    description: The issued token's expiry (unix seconds). Only present when status = approved.
                  device_name:
                    type: string
                    nullable: true
        '404':
          $ref: '#/components/responses/NotFound'

  /api/auth/device/verify:
    post:
      summary: Approve a user_code from an authenticated session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_code]
              properties:
                user_code:
                  type: string
      responses:
        '200':
          description: Result (approved / expired / invalid)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [approved, expired, invalid]
                  device_name:
                    type: string
                    nullable: true

  # --- users ----------------------------------------------------------------
  /api/users:
    get:
      summary: List users (admin)
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      summary: Create user (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [admin, user]
                  default: user
                first_name:
                  type: string
                  nullable: true
                last_name:
                  type: string
                  nullable: true
                must_change_password:
                  type: boolean
                  default: false
                  description: >-
                    When true the new user is forced through the
                    change-password flow on their first login.
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCreated'
        '400':
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: username missing/too long/whitespace, password missing or over 1024 bytes, or role not 'admin'/'user'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'

  /api/users/me/password:
    put:
      summary: Change my password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_password]
              properties:
                current_password:
                  type: string
                new_password:
                  type: string
                  maxLength: 1024
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          description: new_password missing or over 1024 bytes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'

  /api/users/me/name:
    put:
      summary: Change my name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NameUpdate'
      responses:
        '200':
          description: Name updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NameUpdateResult'
        '422':
          description: Malformed request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'

  /api/users/me/sessions:
    get:
      summary: List my sessions (active and expired)
      responses:
        '200':
          description: Sessions grouped by status
          content:
            application/json:
              schema:
                type: object
                properties:
                  active:
                    type: array
                    items:
                      $ref: '#/components/schemas/Session'
                  expired:
                    type: array
                    items:
                      $ref: '#/components/schemas/Session'

  /api/users/me/sessions/{session_id}:
    delete:
      summary: Revoke one of my sessions
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Session revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/users/{username}/role:
    put:
      summary: Change a user's role (admin)
      parameters:
        - $ref: '#/components/parameters/username'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [admin, user]
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          description: >-
            Cannot demote the last admin (this is the only admin account and
            the request would leave none).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: role must be 'admin' or 'user'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'

  /api/users/{username}/password:
    put:
      summary: Reset a user's password (admin)
      parameters:
        - $ref: '#/components/parameters/username'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  maxLength: 1024
                must_change_password:
                  type: boolean
                  default: false
                  description: >-
                    When true the target user must change this password on
                    their next login. Omitted/false clears any pending flag.
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: password missing or over 1024 bytes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'

  /api/users/{username}/name:
    put:
      summary: Change a user's name (admin)
      parameters:
        - $ref: '#/components/parameters/username'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NameUpdate'
      responses:
        '200':
          description: Name updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NameUpdateResult'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Malformed request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'

  /api/users/{username}:
    delete:
      summary: Delete a user (admin)
      parameters:
        - $ref: '#/components/parameters/username'
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          description: >-
            Cannot delete the last admin (this is the only admin account and
            the request would leave none).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/app/{track}/update:
    get:
      summary: Latest available build for a client track
      description: |
        Returns the current manifest for `{track}`, or `204 No Content`
        when no build has been published yet. `{track}` is any
        operator/CI-chosen identifier (e.g. `tv`, `phone`, `tablet`,
        `ios`) — there is no fixed track list; publishing to a new track
        is enough to start serving it. Anonymous (no auth). See
        `doc/UPDATES.md` for the full client protocol.
      security: []
      parameters:
        - name: track
          in: path
          required: true
          schema: { type: string, pattern: '^[a-z0-9][a-z0-9_-]{0,39}$', example: "tv" }
      responses:
        '200':
          description: A build is available
          headers:
            Cache-Control:
              schema: { type: string, example: "no-store" }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateManifest'
        '204':
          description: No build has been published for this track
        '400':
          description: Track name failed validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Auto-update is not configured on this server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/admin/app/updates/{track}:
    post:
      summary: Publish a new build to a client track
      description: |
        Accepts a `multipart/form-data` body with one or more build
        artifacts (one form file per client-defined variant, named
        `build_<variant>`) and release metadata. Streams each file
        straight to a temp file (no full-body buffering), computes its
        SHA-256, and persists the sidecar manifest. Subsequent
        `GET /api/app/{track}/update` returns the new manifest. Files
        belonging to the previous release are deleted once this one
        commits — only the current release's builds are kept on disk.

        `{track}` needs no prior registration — the first publish to a
        new track name creates its storage directory on the fly.

        Supports both a single self-contained POST (all variants at once,
        the default `finalize=true` behavior) and a multi-POST sequence
        for large releases on slow links (`finalize=false` on the first
        N-1 POSTs, `finalize=true` — or omitted — on the last). See
        "Single POST vs multi-POST" in `doc/UPDATES.md` for the full
        state machine and worked examples.

        **Auth:** `Authorization: Bearer <publish_token>`. User/password
        and session Bearer tokens are not accepted. Returns `503` if the
        server has no `publish_token` configured. The same token
        authorizes publishing to any track.
      security:
        - updateToken: []
      parameters:
        - name: track
          in: path
          required: true
          schema: { type: string, pattern: '^[a-z0-9][a-z0-9_-]{0,39}$', example: "tv" }
      requestBody:
        $ref: '#/components/requestBodies/AppUpdatePublish'
      responses:
        '200':
          description: Publish succeeded (state committed or pending — see the schema).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppUpdatePublishResult'
        '400':
          description: Track name failed validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '413':
          description: >-
            Total body (or a single build part) exceeds `[updates] max_apk_size`
            (default 100 MiB).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '422':
          description: >-
            versionName/versionCode missing, versionCode not a non-negative
            integer, or no `build_<variant>` file part present.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '503': { $ref: '#/components/responses/ServiceUnavailable' }

  /api/app/updates/{track}/{filename}:
    get:
      summary: Download a build file from a client track
      description: |
        Serves the file named in `{track}`'s current manifest. A request
        for a different filename is 404 — only the current build is
        fetchable. The Content-Type served is, in order: the value
        declared at publish time, else a guess from the file extension,
        else `application/octet-stream`. Anonymous.
      security: []
      parameters:
        - name: track
          in: path
          required: true
          schema: { type: string, pattern: '^[a-z0-9][a-z0-9_-]{0,39}$', example: "tv" }
        - name: filename
          in: path
          required: true
          schema: { type: string, example: "eneverre-tv-universal-1.0.1.apk" }
      responses:
        '200':
          description: Build file bytes
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '400':
          description: Track name failed validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404': { $ref: '#/components/responses/NotFound' }
        '503':
          description: Auto-update is not configured on this server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:

  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    bearerAuth:
      type: http
      scheme: bearer
      description: Access token issued by POST /api/auth/login (or the device flow).
    updateToken:
      type: http
      scheme: bearer
      description: |
        Publish-only bearer token matching the server's `[updates] publish_token`
        (or `ENEVERRE_UPDATES_PUBLISH_TOKEN`). The publish endpoint
        (POST /api/admin/app/updates/{track}) accepts ONLY this token;
        user/password and session Bearer are rejected. If no token is
        configured on the server, the publish endpoint returns 503. The
        same token authorizes publishing to any track.

  parameters:
    camera_id:
      name: camera_id
      in: path
      required: true
      schema:
        type: string
      example: "interior"
    username:
      name: username
      in: path
      required: true
      schema:
        type: string
      example: "admin"

  requestBodies:
    AppUpdatePublish:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [versionName, versionCode]
            description: >-
              At least one `build_<variant>` file part is required (not
              expressible as a JSON Schema `required` entry since the field
              name is the client-defined variant). For Android tracks,
              `build_arm64-v8a`, `build_armeabi-v7a`, `build_x86_64`,
              `build_x86` and `build_universal` are the common names in
              use; any `build_<variant>` name is accepted (other platforms
              are free to use e.g. `build_ios`, `build_web`). A release can
              carry any combination of them in one POST, or be built up
              across several POSTs (see `finalize` below and
              `doc/UPDATES.md`).
            properties:
              build_arm64-v8a: { type: string, format: binary, description: "Build for arm64-v8a devices" }
              build_armeabi-v7a: { type: string, format: binary, description: "Build for armeabi-v7a devices" }
              build_x86_64: { type: string, format: binary, description: "Build for x86_64 devices (Chromebooks, emulators)" }
              build_x86: { type: string, format: binary, description: "Build for x86 devices (older emulators)" }
              build_universal: { type: string, format: binary, description: "Fallback build for clients that don't list a specific variant" }
              versionName: { type: string, example: "1.0.1" }
              versionCode: { type: integer, example: 10101, description: "Non-negative integer. Common scheme: MAJOR*10000+MINOR*100+PATCH. All POSTs building the same release must share this value." }
              releaseNotes: { type: string, description: "Optional; surfaced to the user in the update dialog" }
              mandatory: { type: boolean, default: false, description: "Optional; if true the dialog is non-cancelable" }
              finalize:
                type: boolean
                default: true
                description: >-
                  Whether this POST makes the release visible to clients.
                  Default true: this POST commits (single-POST publish, the
                  simple case). Set false to stage this POST's APK(s) into
                  the in-progress release without publishing it yet —
                  send a later POST with `finalize=true` (or omitted) to
                  commit. See "Single POST vs multi-POST" in
                  `doc/UPDATES.md`.

  schemas:

    Camera:
      type: object
      required:
        - id
        - name
        - capabilities
      properties:
        id:
          type: string
        name:
          type: string
        comment:
          type: string
        location:
          type: string
        capabilities:
          $ref: '#/components/schemas/Capabilities'
        ptz:
          $ref: '#/components/schemas/PTZMetadata'
        rtsp:
          type: string
          description: >-
            Embedded RTSP relay URL with rotating credentials
            (`rtsp://<user>:<pass>@<host>:<port>/<id>`). `host` is `[media]
            rtsp_host` when set, otherwise the host the client used to reach the
            API. Present whenever the relay feature is on for the camera and a
            host is resolvable; empty when the relay is disabled (`relay =
            false`) or no host can be determined. The raw camera `source` is
            never exposed.
        live_mse:
          type: string
          description: >-
            Same-origin MSE fMP4 path the web UI uses to play live
            (`/api/camera/{id}/live/stream`). Present by default (the MSE feed
            does not require a [media] section); empty when the camera opts out
            with `mse = false` or its codec is unsupported.
        width:
          type: integer
        height:
          type: integer
        privacy:
          type: boolean
          description: >-
            Current privacy state. When true the camera is paused: recording and
            transmission are stopped (and `live_mse`/`rtsp` are withheld), plus
            the firmware lens blackout on thingino cameras.

    Capabilities:
      type: object
      properties:
        privacy:
          type: boolean
          description: >-
            Whether the privacy toggle is offered for this camera (INI `privacy`
            key, default true). False marks an always-on camera.
        thumbnail:
          type: boolean
        playback:
          type: boolean
        ptz:
          type: boolean
        talk:
          type: boolean
          description: >-
            True when the camera has a two-way-audio backchannel configured
            (the `/api/camera/{id}/talk` WebSocket is available).
        talk_codecs:
          type: array
          items:
            type: string
            enum: [aac, g711]
          description: >-
            Push-to-talk codecs the camera accepts, discovered by probing its
            backchannel SDP at startup. Clients send AAC when `aac` is listed,
            otherwise G.711. Absent/empty when talk is false or the camera was
            unreachable at probe time (assume G.711).

    PTZMetadata:
      type: object
      description: >-
        Public PTZ metadata block. Present only when `capabilities.ptz` is true;
        omitted otherwise. Exposes only the lens FOV and the angular range so
        a pixel drag in the UI can be translated to a relative move in degrees
        without any per-camera constants. The steps↔degrees calibration that
        maps pan/tilt to firmware x/y is server-side and is not exposed here —
        a future ONVIF or generic continuous-rotation camera can plug in
        without the API ever promising a step-based contract to clients.
      required: [fov_h, fov_v, pan_range, tilt_range]
      properties:
        fov_h:
          type: number
          description: Horizontal field of view of the lens, in degrees. Drives the pixel→degree mapping for drag gestures in the UI.
          example: 113
        fov_v:
          type: number
          description: >-
            Vertical field of view, in degrees. Derived from `fov_h` and the
            sensor aspect ratio (`fov_h × height / width`).
          example: 63.5
        pan_range:
          type: number
          description: Total pan range of the gimbal, in degrees (e.g. 360 for a continuous-rotation mount).
          example: 360
        tilt_range:
          type: number
          description: Total tilt range of the gimbal, in degrees.
          example: 180

    CameraSpec:
      type: object
      description: >-
        The full stored config of a camera — the create/update request body and
        the GET /api/camera/{id}/config response. It carries the secret fields
        (source, backchannel, snapshot_url, thingino credentials) that the public
        Camera model omits. On create/update the boolean and numeric fields are
        optional: an omitted key falls back to the same default the INI loader
        applies (noted below), not to a zero value.
      required: [id, source]
      properties:
        id:
          type: string
          description: >-
            1–64 chars of letters, digits, '-' or '_', starting with a letter or
            digit. Used as the recording subdirectory and throughout the API, so
            it is immutable — ignored in an update body (the URL fixes it).
        name:
          type: string
        comment:
          type: string
        location:
          type: string
        source:
          type: string
          description: The camera's RTSP URL (required). Must point at the camera itself.
        backchannel:
          type: string
          description: >-
            Optional direct RTSP URL to the camera's ONVIF Profile T two-way-audio
            backchannel; its presence enables the `talk` capability.
        snapshot_url:
          type: string
          description: >-
            Optional HTTP(S) still-JPEG endpoint; its presence enables the
            `thumbnail` capability for a non-thingino camera (proxied, no decode).
        transport:
          type: string
          enum: [auto, tcp, udp]
          default: auto
          description: Per-camera source RTSP transport override.
        record:
          type: boolean
          default: true
          description: Opt this camera out of recording (only recorded when [media] record is on globally).
        mse:
          type: boolean
          default: true
          description: Opt this camera out of the live MSE feed.
        relay:
          type: boolean
          default: true
          description: Opt this camera out of the RTSP relay.
        privacy:
          type: boolean
          default: true
          description: Whether the runtime privacy toggle is offered; false marks an always-on camera.
        playback:
          type: boolean
          default: false
          description: Whether this camera advertises recordings to clients.
        width:
          type: integer
          default: 16
        height:
          type: integer
          default: 9
        thingino_url:
          type: string
        thingino_api_key:
          type: string
          description: >-
            Its presence (with thingino_url) enables the firmware snapshot and the
            lens blackout used by privacy.
        ptz:
          type: boolean
          default: false
        home_x:
          type: number
          default: -1
          description: >-
            PTZ home pan in degrees. The camera returns to this position on
            `POST /api/camera/{id}/ptz/home` and when privacy is disabled.
            -1 (default) means "no auto-move" — the corresponding
            absolute move is skipped. The server converts to firmware
            x/y at call time using the camera's calibration.
        home_y:
          type: number
          default: -1
          description: PTZ home tilt in degrees. See `home_x`.
        privacy_x:
          type: number
          default: -1
          description: >-
            PTZ privacy-position pan in degrees. The camera moves here
            when privacy is enabled. -1 (default) means "no auto-move".
        privacy_y:
          type: number
          default: -1
          description: PTZ privacy-position tilt in degrees. See `privacy_x`.
        pan_steps:
          type: integer
          default: 2130
          description: >-
            Total pan steps the gimbal reports for a full pan revolution.
            Defaults to 2130 (typical thingino gimbal); only change if your
            hardware reports a different value. Server-side: never returned in
            public responses.
        pan_degrees:
          type: integer
          default: 360
          description: Angular range `pan_steps` covers, in degrees. Defaults to 360 (full revolution).
        tilt_steps:
          type: integer
          default: 1600
          description: Total tilt steps for the gimbal's full vertical travel. Defaults to 1600.
        tilt_degrees:
          type: integer
          default: 180
          description: Angular range `tilt_steps` covers, in degrees. Defaults to 180.
        fov_h:
          type: number
          default: 113
          description: >-
            Horizontal field of view of the lens, in degrees. Used by the
            client to translate a pixel drag into a pan/tilt move. Defaults to
            113 (typical wide-angle lens on a 16:9 sensor).

    Recording:
      type: object
      properties:
        start:
          type: string
          format: date-time
        duration:
          type: number

    Message:
      type: object
      description: >-
        Status/error responses. OK responses use `message`; errors use `detail`.
      properties:
        message:
          type: string
        detail:
          type: string

    UpdateManifest:
      type: object
      description: |
        Body of `GET /api/app/{track}/update` when a build is available.
        Clients upgrade iff `versionCode` is strictly greater than their own
        build number. Every build in the release is a first-class entry in
        `builds` — there is no single-build convenience field, even for a
        release with only one variant. `mandatory` removes the "Later" /
        "Skip" buttons in the dialog. See the client selection algorithm in
        `doc/UPDATES.md`.
      required: [versionName, versionCode, mandatory, builds]
      properties:
        versionName:
          type: string
          example: "1.0.1"
        versionCode:
          type: integer
          example: 10101
        mandatory:
          type: boolean
          default: false
        releaseNotes:
          type: string
          description: Optional release notes shown in the update dialog
        builds:
          type: array
          description: One entry per build variant in the release, in CI publish order.
          items:
            $ref: '#/components/schemas/UpdateBuild'

    UpdateBuild:
      type: object
      required: [variant, filename, size, sha256, url]
      properties:
        variant:
          type: string
          description: >-
            Client-defined tag identifying the build (e.g. an Android ABI
            like arm64-v8a/armeabi-v7a/x86/x86_64/universal, or a platform
            name like ios/web). Opaque to the server.
          example: "arm64-v8a"
        filename:
          type: string
          description: Basename of the build file as stored on the server
          example: "eneverre-tv-arm64-1.0.1.apk"
        size:
          type: integer
          format: int64
          description: Size of the build file in bytes
        sha256:
          type: string
          description: Lowercase hex SHA-256 of the file's bytes; the client verifies it after download
          example: "9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08"
        contentType:
          type: string
          description: Content-Type declared at publish time, if any. Omitted if unset.
          example: "application/vnd.android.package-archive"
        url:
          type: string
          format: uri
          description: Absolute URL the client GETs to download this build

    AppUpdatePublishResult:
      type: object
      description: >-
        Response of a successful publish POST. `state` distinguishes a
        finalized (client-visible) release from a staged, in-progress one
        (multi-POST flow).
      required: [ok, state, versionName, versionCode, builds, variants]
      properties:
        ok:
          type: boolean
        state:
          type: string
          enum: [committed, pending]
          description: >-
            `committed`: this POST's `finalize` resolved true, so the
            release is now the current one clients see. `pending`: staged
            only — the in-progress release was updated but is not yet
            visible; a later POST with `finalize=true` commits it.
        versionName:
          type: string
        versionCode:
          type: integer
        builds:
          type: integer
          description: Total number of build files in the release so far (this POST plus any earlier ones with the same versionCode).
        variants:
          type: array
          items:
            type: string
          description: Variants of every build in the release so far.
        variants_appended:
          type: array
          items:
            type: string
          description: Variants this specific POST added. Present only when state is pending.

    Error:
      type: object
      description: Standard error body
      properties:
        detail:
          type: string

    Event:
      type: object
      properties:
        id:
          type: integer
          format: int64
        camera_id:
          type: string
        start_ts:
          type: string
          format: date-time
          description: RFC3339 UTC
        end_ts:
          type: string
          format: date-time
          description: RFC3339 UTC
        type:
          type: string
          example: motion
        source:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          description: RFC3339 UTC

    User:
      type: object
      properties:
        username:
          type: string
        role:
          type: string
          enum: [admin, user]
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        must_change_password:
          type: boolean
          description: >-
            Whether the user must change their password at next login
            (cleared by a successful self password change).

    NameUpdate:
      type: object
      properties:
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true

    UserCreated:
      type: object
      description: >-
        The `message` field plus an echo of the fields the created user was
        given (not the full `User` model — no need to re-query it).
      properties:
        message:
          type: string
        username:
          type: string
        role:
          type: string
          enum: [admin, user]
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        must_change_password:
          type: boolean

    NameUpdateResult:
      type: object
      description: The `message` field plus the name fields as stored.
      properties:
        message:
          type: string
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true

    Session:
      type: object
      properties:
        id:
          type: integer
          format: int64
        fingerprint:
          type: string
          description: First 10 hex chars of the token's SHA-256
        created_at:
          type: integer
          format: int64
          description: Unix seconds
        expires_at:
          type: integer
          format: int64
          description: >-
            Unix seconds. For a renewable session this is the refresh-token
            expiry; otherwise the access-token expiry.
        renewable:
          type: boolean
        is_current:
          type: boolean
        device_name:
          type: string
          nullable: true

  responses:

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Message'

    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Message'

    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Message'

    Forbidden:
      description: Admin role required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Message'

    BadGateway:
      description: Camera or upstream unreachable / rejected the request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Message'

    ServiceUnavailable:
      description: Optional subsystem not configured on this server
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Message'
