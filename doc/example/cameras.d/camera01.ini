# A PTZ Thingino camera. The [thingino] section enables the thumbnail
# capability and the firmware lens blackout (via thingino_api_key) and the PTZ
# endpoints (via ptz = true). Privacy itself works on every camera (see the
# `privacy` key below); on Thingino it also triggers the lens blackout + PTZ.
[camera]
id = camera01
name = Outside
comment = Thingino 360 Camera
location = Exterior
# `source` is the camera's RTSP URL. With the embedded media engine ([media]
# in eneverre.ini) the engine records/relays from it; without the engine it
# is served as-is from /api/cameras. Must point at the camera itself (it
# carries credentials and is never exposed to clients).
source = rtsp://username:password@camera_url:port/camera01
# Optional per-camera RTSP transport override for the embedded engine
# (tcp | udp | auto); empty uses the global [media] transport. Force tcp on a
# lossy/distant camera for reliable delivery.
# transport = tcp
# Per-camera opt-out of the live MSE (fMP4) browser feed. Default true.
# Set to false to skip the MSE broadcaster only — relay and recording
# are unaffected. Gated independently of relay.
# mse = true
# Per-camera opt-out of the RTSP relay entry. Default true.
# Set to false to skip the relay only — MSE and recording are unaffected.
# relay = true
# Per-camera opt-out of recording. Default true, but recording only happens
# when [media] record = true globally (this flag can turn it off, not on).
# Set to false to keep the live MSE feed and RTSP relay working for this
# camera but skip writing to disk — useful for privacy-sensitive cameras you
# only want to watch live.
# record = false
# Per-camera opt-out of the privacy toggle. Default true: every camera offers
# a privacy switch that stops recording AND transmission (live MSE + RTSP
# relay) by pausing the engine's pipeline for it; on thingino cameras it also
# drives the firmware lens blackout + PTZ privacy position. Set to false to
# mark an "always-on" camera that must never be paused (no privacy button).
# privacy = false
# playback = true
# width  = 1920
# height = 1080
# Optional: direct RTSP URL to the camera for two-way audio (push-to-talk via
# the ONVIF Profile T backchannel). Must point at the camera.
# backchannel = rtsp://username:password@192.168.1.91:554/ch0

[thingino]
thingino_url = http://192.168.1.91
thingino_api_key = your-thingino-api-key
ptz = true
# Home / privacy positions in DEGREES (pan, tilt). The server converts to
# firmware x/y at move time using the pan_steps/pan_degrees and
# tilt_steps/tilt_degrees calibration below, so the same physical position
# can be re-tuned by changing the calibration without rewriting these
# numbers. -1 in either axis disables the auto-move. With the default
# 2130/360 / 1600/180 calibration, 180°/90° and 0°/180° land at the same
# physical positions the old step-based config (1065/800, 0/1600) used to.
home_x = 180
home_y = 90
privacy_x = 0
privacy_y = 180
# PTZ calibration: the total steps the gimbal reports for a full pan / tilt
# travel, and the angular range those steps cover. The server uses these to
# convert the public pan/tilt in degrees to firmware x/y in steps and to clamp
# runaway requests. The defaults match the typical thingino gimbal (2130/360
# pan, 1600/180 tilt) and are picked automatically when the keys are absent,
# so you only need to set them if your hardware reports a different value.
# pan_steps = 2130
# pan_degrees = 360
# tilt_steps = 1600
# tilt_degrees = 180
# Horizontal field of view of the lens, in degrees. The vertical FOV is
# derived from this and the aspect ratio at read time. Defaults to 113
# (typical wide-angle lens on a 16:9 sensor); the public Camera model exposes
# it under `ptz.fov_h` so the client can translate a pixel drag into a move
# in degrees.
# fov_h = 113
