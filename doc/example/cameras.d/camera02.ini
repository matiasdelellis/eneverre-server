# A plain fixed camera: no [thingino] section, so no PTZ. Privacy is still
# offered (it stops recording + transmission via the engine; the firmware lens
# blackout just isn't available without thingino). A thumbnail is still possible
# if the camera exposes its own JPEG endpoint — see `snapshot_url` below. With
# playback = true, the embedded media engine (when configured) serves the
# recordings.
[camera]
# `name` identifies the camera; the internal id (API URLs + recording
# subdirectory) is a slug derived from it ("Galery" → "galery"). See
# camera01.ini for the full explanation.
name = Galery
comment = Fixed Camera
location = Interior
# `source` is the camera's RTSP URL. With the embedded media engine ([media]
# in eneverre.ini) the engine records/relays from it; without the engine it
# is served as-is from /api/cameras.
source = rtsp://username:password@camera_url:port/camera02
# Optional: the camera's own still-JPEG endpoint (ONVIF/CGI). When set, it
# enables the thumbnail capability and /api/camera/{id}/thumbnail proxies this
# image (no server-side decode). May carry credentials; never exposed to clients.
# snapshot_url = http://username:password@camera_url/snapshot.jpg
# Optional per-camera opt-out of the live MSE (fMP4) browser feed.
# Default true. Gated independently of relay.
# mse = true
# Optional per-camera opt-out of the RTSP relay entry.
# Default true. Gated independently of mse.
# relay = true
# Per-camera opt-out of recording. Default true (recording is on globally by
# default). Set to false to keep the live feed but skip writing to disk.
# record = false
# Per-camera opt-out of the privacy toggle. Default true: privacy stops
# recording and transmission (live MSE + RTSP relay) for this camera. Set to
# false to mark an always-on camera that must never be paused.
# privacy = false
# The Live/Playback switch appears automatically once this camera has
# recordings on disk. Set playback = false to opt out.
# playback = false
# width  = 1920
# height = 1080
