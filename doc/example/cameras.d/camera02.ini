# A plain fixed camera: no [thingino] section, so no PTZ or thumbnail
# capabilities — just a stream the clients can play. Privacy is still offered
# (it stops recording + transmission via the engine; the firmware lens blackout
# just isn't available without thingino). With playback = true, the embedded
# media engine (when configured) serves the recordings.
[camera]
id = camera02
name = Galery
comment = Fixed Camera
location = Interior
# `source` is the camera's RTSP URL. With the embedded media engine ([media]
# in eneverre.ini) the engine records/relays from it; without the engine it
# is served as-is from /api/cameras.
source = rtsp://username:password@camera_url:port/camera02
# Optional per-camera opt-out of the live MSE (fMP4) browser feed.
# Default true. Gated independently of relay.
# mse = true
# Optional per-camera opt-out of the RTSP relay entry.
# Default true. Gated independently of mse.
# relay = true
# Per-camera opt-out of recording. Default true, but recording only happens
# when [media] record = true globally. Set to false to keep the live feed but
# skip writing to disk.
# record = false
# Per-camera opt-out of the privacy toggle. Default true: privacy stops
# recording and transmission (live MSE + RTSP relay) for this camera. Set to
# false to mark an always-on camera that must never be paused.
# privacy = false
# playback = true
# width  = 1920
# height = 1080
