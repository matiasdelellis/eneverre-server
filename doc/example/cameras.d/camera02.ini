# A plain fixed camera: no [thingino] section, so no PTZ, thumbnail or privacy
# capabilities — just a stream the clients can play (and recordings if MediaMTX
# integration is enabled and playback = true).
[camera]
id = camera02
name = Galery
comment = Fixed Camera
location = Interior
live = rtsp://username:password@camera_url:port/camera02
playback = true
width = 1920
height = 1080
