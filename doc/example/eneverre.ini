[server]
; The admin user is NOT configured here — user management lives in the
; database. On first run an admin is created with a random password logged
; once (see journalctl), or with ENEVERRE_ADMIN_USER / ENEVERRE_ADMIN_PASS
; when those env vars are set. Log in and change it before any real use.
host = 0.0.0.0
port = 8080
; Log level: debug, info (default), warn, error. Overridden by the --log-level
; flag or ENEVERRE_LOG_LEVEL env var. The access-log prints one INFO line per
; request. Set to warn to silence them, at the cost of losing the access-log
; for every other request.
;log_level = info
;
; Read timeout for HTTP request bodies. Default 5m, which is enough for
; publishing a ~200 MiB APK over a 5 Mbps link. The default of 5m is
; generous but bounded — a slow-trickle client still gets cut off. Bump
; when the CI is on a particularly slow link; shrink when the API is
; fronted by a reverse proxy that already enforces a tighter limit.
; Format: time.ParseDuration ("5m", "30s", "1h"). Precedence: this key
; > ENEVERRE_READ_TIMEOUT > 5m.
;read_timeout = 5m

;[auth]
; Token lifetimes (defaults shown). Access is the Bearer-token life — also the
; lifetime of a TV (device-login) session, which cannot be refreshed. Refresh
; is the password-login renewal window, slid forward on every refresh.
;access_token_ttl_hours = 24
;refresh_token_ttl_days = 90
;
; Background token cleanup interval in minutes. A periodic goroutine deletes
; expired tokens so the table stays lean between user logins. 0 or negative
; disables the background loop (cleanup still runs on each login). Precedence:
; this key > ENEVERRE_TOKEN_CLEANUP_INTERVAL > 60 (1h). Set to a higher value
; on low-traffic installs to avoid waking the DB too often, or to 0 to keep
; login-time cleanup only.
;cleanup_interval_minutes = 60
;
; Grace period in hours: a token stays visible in the sessions list for this
; long after it expires before the cleaner deletes it. This lets the frontend
; display an "expired" section alongside the active sessions instead of having
; them disappear the moment they lapse. Default 24 (1 day). 0 deletes expired
; tokens immediately (previous behaviour). Precedence: this key >
; ENEVERRE_TOKEN_CLEANUP_GRACE_HOURS > 24.
;cleanup_grace_hours = 24
;
; Security event log. When set, authentication failures are written here in a
; stable one-line-per-event format for intrusion-prevention tools (fail2ban,
; CrowdSec) to tail and ban abusive IPs. Events are ALSO logged to the main
; log at WARN, so leaving this unset just means "no dedicated file". The path
; must be writable by the eneverre process; its directory is not created for
; you. Rotate it with logrotate's `copytruncate`. Precedence: this key >
; ENEVERRE_SECURITY_LOG > "" (disabled). See doc/security-logging.md.
;security_log = /var/log/eneverre/security.log

;[media]
; Embedded media engine. The engine is always built for cameras with a
; `source` URL. **Live MSE browser feed + RTSP relay are on by default**
; (no [media] needed) — that's the point of the app. The optional [media]
; section adds recording (off by default) and tunes the rest of the engine.
;
; Three independent on/off switches:
;   mse    = true|false   (default true)   — global toggle for live MSE feed
;   relay  = true|false   (default true)   — global toggle for RTSP relay
;   record = true|false   (default false)  — global toggle for disk recording
;
; Per-camera override (in cameras.d/<id>.ini):
;   mse    = true|false   (default true)   — opt this camera out of MSE
;   relay  = true|false   (default true)   — opt this camera out of relay
;   record = true|false   (default true)   — opt this camera out of recording
;
; Examples:
;   mse = false                   ; turn the MSE feed off globally
;   relay = false                 ; turn the RTSP relay off globally
;   record = true                 ; turn disk recording on (requires record_dir)
;   [camera] mse = false          ; skip MSE for a single camera
;   [camera] relay = false        ; skip relay for a single camera
;   [camera] record = false       ; skip recording for a single camera
;
; Where recordings and the segment index live.
;record_dir = /var/lib/eneverre/recordings
;index_path = /var/lib/eneverre/recordings/index.db
; Cache for generated assets (e.g. the black "NO RECORDING" gap-fill frames,
; one tiny .h264 per resolution under <cache_dir>/gapfill/). Persisted so they
; survive restarts (generated once with ffmpeg). Default: <record_dir>/../cache.
; Keep it under a writable path (e.g. /var/lib/eneverre) given ProtectSystem.
;cache_dir = /var/lib/eneverre/cache
; Segment path pattern (must contain %path and time specifiers incl. %f).
; The default is `<record_dir>/%path/%Y-%m-%d/%H/%Y-%m-%d_%H-%M-%S-%f`, so
; a recording started at 10:30:45.123456 on 2025-01-15 for camera01 lives
; at `<record_dir>/camera01/2025-01-15/10/2025-01-15_10-30-45-123456.mp4`.
; Each camera's day is its own subtree, which keeps the file count per
; directory small even on installations with many cameras. The full
; timestamp in the filename keeps segments uniquely named across day
; and hour boundaries. The `retain` option above wipes old segments by
; index (not by file path), so the layout is independent of the
; rotation policy.
;record_path = /var/lib/eneverre/recordings/%path/%Y-%m-%d/%H/%Y-%m-%d_%H-%M-%S-%f
; Minimum segment length and fMP4 fragment length (time.ParseDuration format).
;segment_duration = 60s
;part_duration = 1s
; Delete recordings older than this; 0 (default) keeps forever. e.g. 240h = 10d.
;retain = 240h
; RTSP relay listen address (the server that re-serves the live streams).
;rtsp_address = :8554
; Public hostname clients use to reach the RTSP relay, embedded in the `rtsp`
; URL of /api/cameras (rtsp://<user>:<pass>@<rtsp_host>:<port>/<id>). When unset,
; the host is taken from the request (works out of the box on a LAN); set this
; to pin a public host behind a reverse proxy, where the API and relay hosts
; differ. The web UI uses live_mse regardless.
;rtsp_host = nvr.example.com
; RTSP source transport for recording: auto (default: UDP with TCP fallback),
; tcp (reliable, cleanest on lossy links), or udp. Can be overridden per camera
; with a `transport` key in the camera's INI.
;transport = auto
; Caption burned into the gap-fill black frame (see /get). UTF-8 ok (accents,
; etc.). Changing it regenerates the cached asset. Default: "NO RECORDING".
;gap_message = NO RECORDING
; Stream/relay credential rotation. The relay URL embeds a random 8/8
; username/password that rotates on this interval (hours); the previous pair
; stays valid for one interval as a grace window. 0 (or negative) disables.
;rotate_hours = 24

;[events]
; Required to accept the motion webhook (POST /api/camera/{id}/events). Send
; this secret in the X-Webhook-Secret header or the ?token= query param.
; Without this key the webhook returns 503.
;webhook_secret = change-me
;
; When the webhook records a motion event, it extends the event range to
; the union of [start - pre_seconds, end + post_seconds]. The defaults
; (5 + 5) make a single event cover a 10-second window centered on the
; trigger, which is what the apps' playback timeline expects. Bump them
; if your source fires short bursts you want to widen, or if you want a
; bigger "post-roll" so the timeline highlights the few seconds after
; motion stops.
;pre_seconds  = 5
;post_seconds = 5

;[updates]
; Auto-update server for the Android clients (EneverreTV, phone app). When
; the section is absent and ENEVERRE_UPDATES_DIR is unset, all /api/app/*
; endpoints return 503 (feature off).
;
; Each client "track" (tv, phone) lives in its own subdirectory under
; storage_dir and stores <track>/manifest.json + the uploaded APK next to
; it. The endpoint layout is /api/app/<track>/update (GET), and
; /api/app/updates/<track>/<filename> (GET) for downloads.
;
; Precedence: [updates] storage_dir > ENEVERRE_UPDATES_DIR > <cameras_dir>/../app-updates.
;storage_dir = /var/lib/eneverre/app-updates
;
; The public base URL the manifest's `builds[i].url` field is rooted at.
; **Recommended** in production: this is the operator's authoritative
; source of truth for the URL the Android clients use to download each
; APK. Without it, the server falls back to auto-detecting the scheme and
; host from the request (honoring `X-Forwarded-Proto` / `X-Forwarded-Host`,
; falling back to `r.TLS` and `r.Host`). Behind a TLS-terminating reverse
; proxy (Caddy, Nginx, Cloudflare) the auto-detection only works if the
; proxy is configured to send those headers — which is not the default
; in Caddy. Setting `public_base_url` here is the simplest fix and works
; behind any proxy with zero extra config.
;
; Each builds[i].url becomes <public_base_url>/api/app/updates/<track>/<apkFilename>.
; The equivalent env var is ENEVERRE_UPDATES_PUBLIC_BASE_URL.
public_base_url = https://updates.example.com
;
; Optional publish-only bearer token. When set, the publish endpoints
; (POST /api/admin/app/updates/{tv,phone}) require
; `Authorization: Bearer <token>` and reject user/password and session
; Bearer tokens — only the dedicated token works. Leave empty to keep the
; historical behavior (publish requires an admin user). Precedence:
; [updates] publish_token > ENEVERRE_UPDATES_PUBLISH_TOKEN.
; Generate with `openssl rand -hex 32` (or any 32+ char high-entropy
; secret). Rotating the token revokes CI access immediately; it does not
; affect user logins.
;publish_token = change-me-to-a-32-byte-secret
;
; No release history is kept. At every commit the previous release's
; APKs are deleted, so disk usage is bounded by the current release's
; APKs. A client that started downloading the previous release will get
; a 404 from the moment the new commit lands. (For true in-flight
; support across publishes, use the multi-POST finalize=false flow so a
; single release is built up across many requests before any old APK is
; deleted.)
;
; Hard cap on the publish request body (multipart + APK). Accepts a
; decimal byte count or a K/M/G suffix (1024-based). Enforced via
; http.MaxBytesReader, so a 413 is returned as soon as the body crosses
; the limit (the client may abort the upload before sending the rest).
; Precedence: [updates] max_apk_size > ENEVERRE_UPDATES_MAX_APK_SIZE
; > 100M default. Bump this if your universal APKs exceed 100 MiB
; (current TV universals are ~50-70 MiB, so 100 MiB has comfortable
; headroom; if you ship a larger build, raise this or split into
; per-ABI POSTs).
;max_apk_size = 100M
